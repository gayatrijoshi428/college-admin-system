<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Settings</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- MAIN DASHBOARD CSS -->
  <link rel="stylesheet" href="dashboard.css">

</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="logo">
      <h2>CAMS</h2>
      <p>Admin Panel</p>
    </div>

    <ul>

      <li onclick="window.location.href='dashboard.html'">
        <i class="fa-solid fa-chart-line"></i>
        Dashboard
      </li>

      <li onclick="window.location.href='students.html'">
        <i class="fa-solid fa-user-graduate"></i>
        Students
      </li>

      <li onclick="window.location.href='faculty.html'">
        <i class="fa-solid fa-chalkboard-user"></i>
        Faculty
      </li>

      <li onclick="window.location.href='fees.html'">
        <i class="fa-solid fa-money-bill-wave"></i>
        Fees
      </li>

      <li onclick="window.location.href='events.html'">
        <i class="fa-solid fa-calendar-days"></i>
        Events
      </li>

      <li class="active">
        <i class="fa-solid fa-gear"></i>
        Settings
      </li>

      <li class="logout">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
      </li>

    </ul>

  </div>

  <!-- MAIN CONTENT -->

  <div class="main-content">

    <!-- TOPBAR -->

    <div class="topbar">

      <div>
        <h1>Settings</h1>
        <p>Manage system preferences and admin account</p>
      </div>

      <button class="add-btn">
        <i class="fa-solid fa-floppy-disk"></i>
        Save Changes
      </button>

    </div>

    <!-- SETTINGS CARDS -->

    <div class="settings-container">

      <!-- PROFILE SETTINGS -->

      <div class="settings-card">

        <h3>
          <i class="fa-solid fa-user"></i>
          Admin Profile
        </h3>

        <div class="input-group-custom">
          <label>Admin Name</label>
          <input type="text" placeholder="Enter admin name">
        </div>

        <div class="input-group-custom">
          <label>Email Address</label>
          <input type="email" placeholder="Enter email">
        </div>

        <div class="input-group-custom">
          <label>Phone Number</label>
          <input type="text" placeholder="Enter phone number">
        </div>

      </div>

      <!-- SECURITY SETTINGS -->

      <div class="settings-card">

        <h3>
          <i class="fa-solid fa-lock"></i>
          Security Settings
        </h3>

        <div class="input-group-custom">
          <label>Current Password</label>
          <input type="password" placeholder="Current password">
        </div>

        <div class="input-group-custom">
          <label>New Password</label>
          <input type="password" placeholder="New password">
        </div>

        <div class="input-group-custom">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm password">
        </div>

      </div>

      <!-- SYSTEM SETTINGS -->

      <div class="settings-card">

        <h3>
          <i class="fa-solid fa-sliders"></i>
          System Preferences
        </h3>

        <div class="setting-option">
          <span>Enable Notifications</span>
          <input type="checkbox" checked>
        </div>

        <div class="setting-option">
          <span>Dark Mode</span>
          <input type="checkbox" checked>
        </div>

        <div class="setting-option">
          <span>Email Alerts</span>
          <input type="checkbox">
        </div>

      </div>

    </div>

  </div>

  <!-- MAIN DASHBOARD JS -->

  <script src="dashboard.js"></script>

</body>
</html>
